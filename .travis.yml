language: cpp

before_script:
  - sudo apt-get update
  - sudo apt-get install -y libgtest-dev cmake
  - cd /usr/src/gtest && sudo cmake . && sudo make && sudo cp lib/*.a /usr/lib && cd -

script:
  - cmake -H. -B_build -DBUILD_TESTS=ON -DCMAKE_INSTALL_PREFIX=_install
  - cmake --build _build --target install
  - cmake --build _build --target test -- ARGS=--verbose

notifications:
  email: false
